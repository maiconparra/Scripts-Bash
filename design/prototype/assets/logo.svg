<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- WifiPirata Logo - SVG Traced -->
  <defs>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4d4d4"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#787878"/>
    </linearGradient>
    <linearGradient id="swordGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#686868"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(256, 240)" filter="url(#glow)">
    <!-- ===== WIFI SIGNAL (top of hat) ===== -->
    <g class="wifi-signal" fill="none" stroke="#b0b0b0" stroke-width="5" stroke-linecap="round">
      <path d="M-30,-155 Q0,-175 30,-155" opacity="0.5"/>
      <path d="M-20,-145 Q0,-160 20,-145" opacity="0.7"/>
      <path d="M-10,-137 Q0,-148 10,-137"/>
      <circle cx="0" cy="-130" r="3" fill="#b0b0b0"/>
    </g>

    <!-- ===== HAT ===== -->
    <g fill="url(#metalGrad)">
      <!-- Hat brim -->
      <path d="M-130,-95 Q-145,-90 -150,-80 Q-140,-75 -110,-78 L-60,-88 Q-30,-92 0,-93 Q30,-92 60,-88 L110,-78 Q140,-75 150,-80 Q145,-90 130,-95 Q70,-105 0,-108 Q-70,-105 -130,-95Z" fill="#606060"/>
      <!-- Hat top -->
      <path d="M-70,-95 Q-75,-140 -55,-165 Q-30,-180 0,-182 Q30,-180 55,-165 Q75,-140 70,-95 Q35,-105 0,-108 Q-35,-105 -70,-95Z" fill="#505050" stroke="#686868" stroke-width="1"/>
      <!-- Hat band -->
      <path d="M-72,-98 Q-35,-108 0,-110 Q35,-108 72,-98 Q35,-102 0,-104 Q-35,-102 -72,-98Z" fill="#787878"/>
    </g>

    <!-- ===== HAIR ===== -->
    <g fill="#808080" opacity="0.8">
      <!-- Left hair strands -->
      <path d="M-85,-60 Q-110,-20 -120,30 Q-115,50 -105,65 Q-100,40 -95,10 Q-90,-20 -80,-50Z"/>
      <path d="M-90,-50 Q-120,0 -130,50 Q-125,70 -115,80 Q-115,50 -105,20 Q-100,-10 -85,-45Z"/>
      <path d="M-80,-65 Q-100,-30 -110,20 Q-105,45 -95,55 Q-95,25 -85,0 Q-80,-30 -75,-55Z"/>
      <!-- Right hair strands -->
      <path d="M85,-60 Q110,-20 120,30 Q115,50 105,65 Q100,40 95,10 Q90,-20 80,-50Z"/>
      <path d="M90,-50 Q120,0 130,50 Q125,70 115,80 Q115,50 105,20 Q100,-10 85,-45Z"/>
      <path d="M80,-65 Q100,-30 110,20 Q105,45 95,55 Q95,25 85,0 Q80,-30 75,-55Z"/>
    </g>

    <!-- ===== FACE ===== -->
    <g>
      <!-- Face shape -->
      <path d="M-55,-70 Q-65,-30 -60,10 Q-55,40 -45,60 Q-30,80 0,90 Q30,80 45,60 Q55,40 60,10 Q65,-30 55,-70 Q30,-80 0,-82 Q-30,-80 -55,-70Z" fill="#707070" opacity="0.6"/>

      <!-- Brow ridge -->
      <path d="M-45,-55 Q-25,-65 0,-60 Q25,-65 45,-55" stroke="#808080" stroke-width="4" fill="none"/>

      <!-- Eyes - angry slant -->
      <g fill="#484848">
        <path d="M-35,-40 Q-25,-50 -15,-42 Q-20,-35 -30,-35Z"/>
        <path d="M35,-40 Q25,-50 15,-42 Q20,-35 30,-35Z"/>
      </g>

      <!-- Nose -->
      <path d="M-5,-25 Q0,-15 5,-25" stroke="#888" stroke-width="2.5" fill="none"/>
      <path d="M-3,-22 L0,-18 L3,-22" stroke="#888" stroke-width="1.5" fill="none"/>

      <!-- Nose bridge -->
      <line x1="0" y1="-35" x2="0" y2="-22" stroke="#808080" stroke-width="2"/>

      <!-- Beard / Mouth area -->
      <g fill="#808080" opacity="0.7">
        <!-- Mustache -->
        <path d="M-30,-10 Q-15,-5 0,-8 Q15,-5 30,-10 Q20,-15 0,-13 Q-20,-15 -30,-10Z"/>
        <!-- Beard strands -->
        <path d="M-35,0 Q-40,25 -35,50 Q-30,65 -20,75 Q-15,55 -20,30 Q-25,10 -30,0Z"/>
        <path d="M-15,5 Q-18,35 -15,55 Q-10,70 0,80 Q-5,55 -8,35 Q-10,15 -10,5Z"/>
        <path d="M15,5 Q18,35 15,55 Q10,70 0,80 Q5,55 8,35 Q10,15 10,5Z"/>
        <path d="M35,0 Q40,25 35,50 Q30,65 20,75 Q15,55 20,30 Q25,10 30,0Z"/>
      </g>

      <!-- Mouth / Teeth -->
      <g>
        <path d="M-20,5 Q-10,18 0,15 Q10,18 20,5" stroke="#505050" stroke-width="2" fill="#383838"/>
        <!-- Fangs -->
        <line x1="-12" y1="5" x2="-10" y2="14" stroke="#999" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="5" x2="10" y2="14" stroke="#999" stroke-width="2" stroke-linecap="round"/>
        <line x1="-5" y1="7" x2="-4" y2="12" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="5" y1="7" x2="4" y2="12" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>

    <!-- ===== CROSSED SWORDS ===== -->
    <g stroke="url(#swordGrad)" stroke-width="5" stroke-linecap="round" fill="none">
      <!-- Left sword -->
      <line x1="-80,110" y1="110" x2="80" y2="110" stroke-width="0"/>
      <g transform="rotate(-30, 0, 105)">
        <!-- Blade -->
        <line x1="-90" y1="105" x2="90" y2="105" stroke="#999" stroke-width="4"/>
        <!-- Guard -->
        <line x1="-15" y1="97" x2="-15" y2="113" stroke="#aaa" stroke-width="5" stroke-linecap="round"/>
        <!-- Handle -->
        <line x1="-15" y1="105" x2="-45" y2="105" stroke="#666" stroke-width="7" stroke-linecap="round"/>
        <!-- Pommel -->
        <circle cx="-48" cy="105" r="5" fill="#777"/>
      </g>
      <!-- Right sword -->
      <g transform="rotate(30, 0, 105)">
        <line x1="-90" y1="105" x2="90" y2="105" stroke="#999" stroke-width="4"/>
        <line x1="15" y1="97" x2="15" y2="113" stroke="#aaa" stroke-width="5" stroke-linecap="round"/>
        <line x1="15" y1="105" x2="45" y2="105" stroke="#666" stroke-width="7" stroke-linecap="round"/>
        <circle cx="48" cy="105" r="5" fill="#777"/>
      </g>
    </g>

    <!-- ===== TEXT ===== -->
    <text x="0" y="175" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-size="38" font-weight="900" fill="#b0b0b0" letter-spacing="3" style="text-transform:uppercase;">
      WI-FIPIRATA
    </text>
  </g>
</svg>
